[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.3"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["homebrew", "npm", "shell"]
# Publish the Homebrew formula to blankeos/homebrew-tap
# (installs as: brew install blankeos/tap/uplate)
tap = "blankeos/homebrew-tap"
# Publish package-manager metadata after release assets are uploaded
publish-jobs = ["homebrew", "npm"]
# Keep the customized generated GitHub Actions workflow intact.
# cargo-dist validates generated CI files byte-for-byte by default; this allows
# intentional workflow edits such as changelog/release and publishing customizations.
allow-dirty = ["ci"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
